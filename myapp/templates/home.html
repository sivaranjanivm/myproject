<!DOCTYPE html>
<html>
<head>
    <title>My Gallery</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
    <h1>My Image Gallery</h1>
</header>

<div class="container">
    {% for item in items %}
        <div class="card">
            <img src="{{ item.image.url }}" alt="">
            <div class="content">
                <h2>{{ item.title }}</h2>
                <p>{{ item.description }}</p>
            </div>
        </div>
    {% endfor %}
</div>

</body>
</html>
